appId: com.omarelkhatib.superstarpt
---
- runFlow: ../fixtures/session-start.yaml
- assertVisible:
    id: card-daily-checkin
- assertVisible:
    id: daily-checkin-missing-state
- assertVisible:
    id: btn-open-daily-checkin
- takeScreenshot: daily_checkin_missing_state
- tapOn:
    id: btn-open-daily-checkin
- assertVisible:
    id: daily-checkin-editor
- assertVisible:
    id: daily-checkin-mode-label
- tapOn:
    id: btn-save-daily-checkin
- assertVisible:
    id: daily-checkin-summary-state
- assertVisible:
    id: daily-checkin-summary-pain
- assertVisible:
    id: daily-checkin-summary-readiness
- assertVisible:
    id: daily-checkin-summary-fatigue
- scrollUntilVisible:
    element:
      id: card-todays-recommendation
    direction: DOWN
- assertVisible:
    id: recommendation-source-text
- assertVisible:
    id: result-action-label
- assertVisible:
    id: result-activity-type
- assertVisible:
    id: result-volume-guidance
- assertVisible:
    id: result-summary-text
- assertVisible:
    id: recommendation-fallback-note
- scrollUntilVisible:
    element:
      id: card-recommendation-history
    direction: DOWN
- assertVisible:
    id: card-recommendation-history
- takeScreenshot: daily_checkin_complete_state
