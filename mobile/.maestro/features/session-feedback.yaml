appId: com.omarelkhatib.superstarpt
---
- runFlow: ../fixtures/session-start.yaml
- assertVisible:
    id: card-session-browser
- assertVisible:
    id: card-add-session
- assertVisible:
    id: input-session-pain
- assertVisible:
    id: btn-add-session
- tapOn:
    id: btn-add-session
- assertVisible:
    id: feedback-banner
- assertVisible:
    id: feedback-banner-success
- takeScreenshot: session_feedback_success_banner
- scrollUntilVisible:
    element:
      id: input-session-pain
    direction: DOWN
- tapOn:
    id: input-session-pain
- eraseText
- inputText: "11"
- tapOn:
    id: screen-home-title
- scrollUntilVisible:
    element:
      id: btn-add-session
    direction: DOWN
- tapOn:
    id: btn-add-session
- assertVisible:
    id: feedback-banner
- assertVisible:
    id: feedback-banner-error
- assertVisible: "Pain score must be between 0 and 10."
- takeScreenshot: session_feedback_error_banner
