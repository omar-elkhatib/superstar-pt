name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  mobile-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm run mobile:install

      - name: Mobile tests
        run: npm run mobile:test

  ios-maestro-e2e:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: macos-latest
    env:
      MAESTRO_CLI_NO_ANALYTICS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm run mobile:install

      - name: Verify iOS tooling
        run: xcodebuild -version && xcrun simctl list devices && pod --version

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro CLI
        run: maestro --version

      - name: Run iOS Maestro E2E
        run: npm run e2e:maestro

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-artifacts
          path: |
            mobile/.derived-data/maestro
            mobile/.expo/xcodebuild.log
          if-no-files-found: warn
